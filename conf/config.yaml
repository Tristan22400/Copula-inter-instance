defaults:
  - model: copula_transformer
  - data: gp_tasks
  - _self_

seed: 42

wandb:
  project: copula-inter-instance
  entity: null   # override with your wandb username/org

training:
  device: auto
  batch_size: 32
  steps: 50000
  lr: 3.0e-4
  lr_min: 1.0e-5
  warmup_steps: 1000
  clip_grad_norm: 10.0
  log_every: 100
  val_every: 500
  save_every: 5000
  ckpt_dir: ./checkpoints/copula_transformer
  dataset_dir: ./data/pit_episodes_cosine
  val_fraction: 0.05   # fraction of episodes held out for validation
  plot_val_every: 1000  # generate val plots every N steps (0 = never)
  # Muon optimizer (Jordan et al. 2024b / Moonlight Liu et al. 2025)
  muon_lr: 8.0e-4             # base LR; effective LR = muon_lr * 0.2 * sqrt(max(n,m))
  muon_momentum: 0.95
  muon_weight_decay: 0.01     # cautious weight decay (Chen et al. 2025a)
  muon_matched_adamw_rms: 0.2
  muon_ns_steps: 5
  muon_nesterov: true
  muon_adamw_betas: [0.95, 0.95]
  muon_adamw_eps: 1.0e-8
  # Auxiliary MSE loss on off-diagonal correlations vs oracle R_star.
  # Provides a direct gradient signal; 0.0 disables it entirely.
  aux_mse_weight: 0.0

tabicl:
  ckpt: tabicl-regressor-v2-20260212.ckpt
  k_folds: 10        # number of folds for training-set PIT (true LOO = P, slow)
  pit_eps: 1.0e-6
