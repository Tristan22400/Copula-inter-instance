defaults:
  - model: copula_transformer
  - data: gp_tasks
  - _self_

seed: 42

wandb:
  project: copula-inter-instance
  entity: null   # override with your wandb username/org

training:
  device: auto
  batch_size: 32
  # torch.compile adds real overhead (first-step + recompiles on shape changes);
  # worth it for long runs, a drag while iterating quickly. Off by default.
  compile: false
  steps: 500000
  warmup_steps: 1000
  clip_grad_norm: 1.0
  log_every: 100
  val_every: 500
  save_every: 5000
  ckpt_dir: null
  # Path to a checkpoint saved by save_checkpoint() (model + optimizer +
  # scheduler + step). When set, training resumes from step+1 instead of 0.
  # Everything else (steps, LR schedule, dataset, etc.) follows this run's
  # config, not the one baked into the checkpoint.
  # Usage: python src/train.py training.resume_ckpt=./checkpoints/copula_transformer/step_0029999.pt
  resume_ckpt: null
  dataset_dir: ./data/systematic_composition-8/pit
  val_fraction: 0.05   # fraction of episodes held out for validation
  # For sharded datasets: shuffle within blocks of this many shards at a time
  # (all shuffled together, IO-cache resident) instead of one global shuffle
  # across every shard — avoids thrashing the shard LRU cache on network
  # storage. Still a true per-epoch permutation, just chunked randomization.
  shard_block_shards: 16
  plot_val_every: 1000  # generate val plots every N steps (0 = never)
  # Muon optimizer (Jordan et al. 2024b / Moonlight Liu et al. 2025)
  muon_lr: 2.0e-4             # base LR; effective LR = muon_lr * 0.2 * sqrt(max(n,m))
  muon_lr_min: 1.0e-6         # cosine decay floor
  muon_momentum: 0.95
  muon_weight_decay: 0.01     # cautious weight decay (Chen et al. 2025a)
  muon_matched_adamw_rms: 0.2
  muon_ns_steps: 5
  muon_nesterov: true
  
  muon_adamw_betas: [0.95, 0.95]
  muon_adamw_eps: 1.0e-8
  # Scalar weight on the Y-space NLL (copula + marginal); 1.0 = standard.
  nll_weight: 1.0
  # Auxiliary MSE loss on off-diagonal correlations vs oracle R_star.
  # Provides a direct gradient signal; 0.0 disables it entirely.
  aux_mse_weight: 0.0

tabicl:
  pretrained: true   # false → randomly-initialised backbone (uses arch section below)
  ckpt: tabicl-regressor-v2-20260212.ckpt  # ignored when pretrained=false
  # Architecture params — only used when pretrained=false.
  # Defaults match the released tabicl-regressor-v2 checkpoint.
  # arch:
  #   embed_dim: 128
  #   col_num_blocks: 3
  #   col_nhead: 8
  #   col_num_inds: 128
  #   row_num_blocks: 3
  #   row_nhead: 8
  #   row_num_cls: 4
  #   icl_num_blocks: 12
  #   icl_nhead: 8
  #   ff_factor: 2
  #   dropout: 0.0

# LoRA fine-tuning of the TabICL backbone.
# Override from CLI: lora.enabled=true lora.rank=16 lora.stages=[icl,row]
lora:
  enabled: false
  rank: 8
  alpha: 16.0
  target: "qkvo"
  stages:
    - icl
