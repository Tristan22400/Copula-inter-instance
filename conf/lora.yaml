# LoRA fine-tuning configuration for the TabICL backbone.
#
# When enabled=true, the pretrained TabICL weights are frozen and only the
# LoRA A/B matrices + the copula_head are trained.  This reduces trainable
# params from ~50M to a few hundred K, which is useful when GPU memory or
# data is limited.
#
# Usage:
#   python src/train.py +lora=lora lora.enabled=true
#   python src/train.py +lora=lora lora.rank=16 lora.stages=[icl,row]
#
# Parameters
# ----------
# enabled : bool   — activate LoRA (false = standard full fine-tune)
# rank    : int    — low-rank dimension r; try 4/8/16/32
# alpha   : float  — scaling factor; effective scale = alpha/rank
#                    keeping alpha=2*rank (e.g. alpha=16, rank=8) is common
# target  : str    — projections to adapt; any subset of "qkvo"
#                    q=query, k=key, v=value, o=output projection
# stages  : list   — which TabICL sub-modules to patch:
#                      icl → icl_predictor  (12 transformer blocks, most params)
#                      row → row_interactor (3 blocks)
#                      col → col_embedder   (3 induced-SA blocks, 2 MHAs each)

enabled: false
rank: 8
alpha: 16.0
target: "qkvo"
stages:
  - icl
  - row
  - col
