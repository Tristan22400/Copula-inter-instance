# ---------------------------------------------------------------------------
# GP task generation config — inter-instance Gaussian copula
# ---------------------------------------------------------------------------

d_features: 10          # total feature columns seen by the neural network

# Kernel active-column selection (random per task)
# k ~ Uniform[d_kernel_min, d_kernel_max] columns are passed to the kernel;
# the remaining d_features - k columns are irrelevant noise the model must ignore.
d_kernel_min: 1
d_kernel_max: 4

# Training/context set size range
P_min: 32
P_max: 1024             # fewer train points → more residual posterior uncertainty

# Test/query set size range (copula is over these N instances)
N_min: 8
N_max: 128

# Number of tasks to generate
n_tasks: 5000000

# GP kernel hyperparameter priors (shared across all stationary kernels,
# except "hebo" — its Gamma/LogNormal constants are fixed, tuned "HEBO+"
# values from the PFN4BO paper; see data_gen.py::HEBO_PLUS_HYPERPARAMETERS).
# lengthscale ~ LogNormal(l_lognormal_loc, l_lognormal_scale), with loc
# shifted by +0.5*log(k) when l_scale_by_sqrt_k (k = active kernel dims) —
# squared distance grows ~linearly with k, so without this shift a shared
# lengthscale distribution mixes very different correlation regimes across k.
l_lognormal_loc: 1.0986    # log(3.0)
l_lognormal_scale: 0.7
l_scale_by_sqrt_k: true
alpha2_gamma_concentration: 4.0   # outputscale ~ Gamma(concentration, rate)
alpha2_gamma_rate: 3.0

# Nugget: single diagonal regulariser ~ LogNormal(nugget_lognormal_loc, nugget_lognormal_scale).
# Guarantees PSD and controls posterior tightness (replaces separate noise param).
nugget_lognormal_loc: -1.897    # log(0.15)
nugget_lognormal_scale: 0.4

# Test-side oracle for R_star/mu_star/sigma_star (and hence z_test):
#   posterior: condition on the training context (K_ss − K_st K_ff⁻¹ K_ts) —
#              off-diagonal correlations shrink with more/closer train points.
#   prior:     raw kernel structure among test points only, ignoring the
#              training context entirely.
# z_train's LOO PIT is unaffected either way (always exact GP LOO on K_ff).
oracle_mode: prior

# ---------------------------------------------------------------------------
# Kernel selection
# ---------------------------------------------------------------------------
# Use a single fixed kernel:
#   kernel: rbf
# Or sample uniformly from a list each task:
#   kernels: [rbf, matern32, cosine, periodic, rational_quadratic, dot_product, hebo]
#
# Available kernels: rbf, matern32, cosine, periodic, rational_quadratic, dot_product, hebo
# (plus 20 "A+B"/"A*B" composites of {rbf, matern32, cosine, periodic, rational_quadratic} — see data_gen.COMPOSITE_KERNELS)
kernel: dot_product

# Extra hyperparameter priors (only used by the indicated kernels)
period_lognormal_loc: 0.1823    # log(1.2) — periodic kernel's `period` parameter
period_lognormal_scale: 0.4
rq_alpha_gamma_concentration: 2.0    # rational_quadratic kernel's `rq_alpha`
rq_alpha_gamma_rate: 1.0

# PIT epsilon for probit clamping (analytical pipeline)
pit_eps: 1.0e-6

# Episodes per shard file (D: reduces NFS metadata ops by this factor).
# Increase for large datasets; 256 works well for P_max<=30, N_max<=50.
shard_size: 256

# Output directory
dataset_dir: ./data/pit_cosine_prior
pit_dir: ${data.dataset_dir}/pit

# Resume from existing files if present
resume: false
