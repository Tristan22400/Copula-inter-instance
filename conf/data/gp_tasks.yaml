# ---------------------------------------------------------------------------
# GP task generation config — inter-instance Gaussian copula
# ---------------------------------------------------------------------------

d_features: 10          # total feature columns seen by the neural network

# Kernel active-column selection (random per task, via gpytorch's own
# active_dims kernel kwarg — see data_gen.py::_sample_active_dims).
# A fraction ~ Uniform[inactive_frac_min, inactive_frac_max] of the
# d_features columns is left inactive (irrelevant noise the model must
# learn to ignore); the rest are the kernel's active_dims. Defaults below
# give k = d_features - round(frac*d_features) ~ {1,2,3,4} for d_features=10.
inactive_frac_min: 0.1
inactive_frac_max: 0.8

# Training/context set size range
P_min: 32
P_max: 512             # fewer train points → more residual posterior uncertainty

# Test/query set size range (copula is over these N instances)
N_min: 8
N_max: 128

# Number of tasks to generate
n_tasks: 20000000

# GP kernel hyperparameter priors (shared across all stationary kernels,
# except "hebo"'s lengthscale/outputscale — its Gamma constants are fixed,
# tuned "HEBO+" values from the PFN4BO paper; see
# data_gen.py::HEBO_PLUS_HYPERPARAMETERS).
# lengthscale ~ LogNormal(l_lognormal_loc, l_lognormal_scale), loc constant
# in k (active kernel dims) — no k-dependent shift.
l_lognormal_loc: 0.0    # log(1.0)
l_lognormal_scale: 0.5
alpha2_gamma_concentration: 4.0   # outputscale ~ Gamma(concentration, rate)
alpha2_gamma_rate: 3.0

# ARD: sample one independent lengthscale per active kernel dimension
# (ard_num_dims=k) instead of one isotropic scalar shared across all k dims.
# Applies to rbf/matern32/periodic/rational_quadratic ("hebo" is always ARD
# regardless of this flag; "cosine"/"dot_product" can't be — see
# data_gen.py's module docstring). Default false preserves prior behaviour.
# "periodic" is always capped to k=1 active dims regardless (see data_gen.py).
ard: true

# Even when a kernel is ARD (via `ard: true` above, or "hebo" which is
# always ARD), each episode independently has this probability of having
# its lengthscale (and periodic's period) collapsed to one shared value
# across active dims instead of one independent value per dim — i.e. an
# isotropic kernel in effect, mixed in among the ARD episodes. Default 0.0
# (no isotropic override) preserves prior behaviour. See
# data_gen.py::_build_scaled_kernel / _collapse_isotropic.
isotropic_ratio: 0.0

# DAG feature mixing: optionally entangle the d_features input columns
# through a small stack of random dense affine + nonlinearity layers,
# applied to the GP's INPUT coordinates x (never to sampled outputs y)
# before the existing per-episode z-normalisation -- preserves the EXACT
# analytic oracle. See data_gen.py::apply_dag_feature_mixing.
# Default off: byte-for-byte no-op for every existing config/dataset.
dag_mixing_enabled: true
# Fraction of episodes per generate_gp_batch call that get mixed at all
# (Bernoulli gate); the rest pass through unmixed, mirroring
# tabiclv2_warp_features's identity-transform choice.
dag_mixing_prob: 0.9
# Number of mixing layers, sampled once per batch call (shared by every
# episode in that call). Kept small (1-2): each layer risks collapsing
# R_star toward independence or saturating an activation -- validate any
# change against tests/test_dataset_corr_uniform.py on a pilot dataset
# before a full generation run.
dag_num_layers_min: 1
dag_num_layers_max: 4
# Std of each layer's random weight matrix before 1/sqrt(d_features)
# fan-in scaling -- keeps the pre-activation roughly variance-preserving.
dag_mix_weight_std: 1.0

# Nugget/noise: single diagonal regulariser ~ LogNormal(nugget_lognormal_loc,
# nugget_lognormal_scale), shared by ALL kernels including "hebo" (this is
# now literally HEBO+'s tuned noise prior — see
# data_gen.py::HEBO_PLUS_HYPERPARAMETERS's hebo_noise_logmean/hebo_noise_std).
# Guarantees PSD and controls posterior tightness.
nugget_lognormal_loc: -4.63
nugget_lognormal_scale: 0.5

# Test-side oracle for R_star/mu_star/sigma_star (and hence z_test):
#   posterior: condition on the training context (K_ss − K_st K_ff⁻¹ K_ts) —
#              off-diagonal correlations shrink with more/closer train points.
#   prior:     raw kernel structure among test points only, ignoring the
#              training context entirely.
# z_train's LOO PIT is unaffected either way (always exact GP LOO on K_ff).
oracle_mode: prior

# ---------------------------------------------------------------------------
# Kernel selection
# ---------------------------------------------------------------------------
# Use a single fixed kernel:
#   kernel: rbf
# Or sample uniformly from a list each task:
#   kernels: [rbf, matern32, cosine, periodic, rational_quadratic, dot_product, hebo]
#
# Available kernels: rbf, matern32, cosine, periodic, rational_quadratic, dot_product, hebo
# (plus 20 "A+B"/"A*B" composites of {rbf, matern32, cosine, periodic, rational_quadratic} — see data_gen.COMPOSITE_KERNELS)
kernel: rbf

# Systematic composition (CauKer-style, github.com/ShifengXIE/CauKer): if
# true, ignores kernel/kernels above entirely and instead samples a random
# chain length M ~ Uniform[composite_num_kernels_min, composite_num_kernels_max],
# draws M elementary kernels with replacement from {rbf, matern32, cosine,
# periodic, rational_quadratic}, and combines them left-to-right with
# independently-sampled +/* operators — see data_gen.py::
# _sample_kernel_chain_structure / _build_kernel_chain. Produces chain names
# like "rbf+cosine*periodic" that are NOT in ALL_KERNELS/KERNEL_REGISTRY
# (unbounded cardinality) and are not reconstructible via build_kernel_fn.
systematic_composition: true
composite_num_kernels_min: 1
composite_num_kernels_max: 8
# Optional: drop elementary kernels from the systematic_composition sampling
# pool (data_gen._COMPOSABLE_KERNELS) without affecting the static 20-entry
# COMPOSITE_KERNELS pool used by the non-systematic path. e.g. [periodic] to
# exclude periodic chains entirely. Empty = sample from all of
# {rbf, matern32, cosine, periodic, rational_quadratic} as before.
composite_exclude_kernels: [periodic, cosine]

# "hebo" (PFNs4BO's tuned "HEBO+" prior) needs different P/N ranges than the
# defaults above — see data_gen.py::HEBO_PLUS_HYPERPARAMETERS and the module
# docstring for why. l_*/alpha2_*/nugget_* keys above are ignored for this
# kernel (its Gamma/LogNormal constants are fixed). Override at the CLI
# rather than switching config files, e.g.:
#   python src/generate_pit_dataset.py data.kernel=hebo \
#     data.P_min=512 data.P_max=512 data.N_min=8 data.N_max=64 \
#     data.dataset_dir=./data/pit_hebo_prior-true data.resume=true
# P_min=P_max=512: HEBO+'s per-dimension lengthscale ~ Gamma(mean~0.8) on a
#   UNIT CUBE input domain (see the ndtr mapping in data_gen.py) conditions
#   away almost all test-side correlation once P grows past a handful of
#   points — diag_kernels.py showed a screening effect (46% of
#   |R*_offdiag| < 0.01) at this file's default P range. Tuned empirically,
#   same as the composite kernels needing P_min=4,P_max=6 overrides.
# N_max=64 (vs. this file's default 128): HEBO+'s noise nugget is
#   LogNormal(-4.63, 0.5) — much smaller than every other kernel's
#   deliberately large nugget floor here. With tiny noise, larger N raises
#   the chance two test points land close together (near-duplicate under the
#   sampled lengthscale) and R_star's min eigenvalue dips under this repo's
#   0.001 well-conditioned floor. Empirically: N_max=128 gave 1/500 episodes
#   just under the floor (min_eig=9.2e-4); N_max=64 removes the failure.

# Extra hyperparameter priors (only used by the indicated kernels)
period_lognormal_loc: 0.1823    # log(1.2) — periodic kernel's `period` parameter
period_lognormal_scale: 0.4
rq_alpha_gamma_concentration: 2.0    # rational_quadratic kernel's `rq_alpha`
rq_alpha_gamma_rate: 1.0

# PIT epsilon for probit clamping (analytical pipeline)
pit_eps: 1.0e-6

# Episodes per shard file (D: reduces NFS metadata ops by this factor).
# Increase for large datasets; 256 works well for P_max<=30, N_max<=50.
shard_size: 256

# Output directory
dataset_dir: ./data/systematic_composition
pit_dir: ${data.dataset_dir}/pit

# Resume from existing files if present
resume: false
