# ---------------------------------------------------------------------------
# Copula Transformer — inter-instance correlation model
# ---------------------------------------------------------------------------

d_model: 128
n_heads: 8

# Stage counts
L_col: 3        # column-wise ISA blocks
L_row: 3        # row-wise transformer blocks
L_ICL: 12       # ICL transformer blocks

n_inducing: 128  # inducing points in column-wise ISA
n_cls: 4         # CLS tokens per row (d_ICL = n_cls * d_model = 512)

rank: 32         # copula output rank (W ∈ R^{N×rank}); higher = richer correlation structures

dropout: 0.1
